<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المجتمع السري للدردشة والمكالمات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding: 0; 
            transition: all 0.25s ease;
        }

        body { 
            background: radial-gradient(circle at center, #1a1c29 0%, #0a0b10 100%);
            color: #f1f5f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(#7c3aed, #06b6d4); border-radius: 10px; }

        /* ==================== شاشة الدخول ==================== */
        .auth-container { 
            background: rgba(18, 20, 32, 0.65); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 2px rgba(124, 58, 237, 0.5) inset;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.5s ease-out;
        }
        .auth-container h2 { 
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px; 
        }
        .auth-container p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 25px; }
        .auth-container input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            border-radius: 14px; 
            outline: none; 
            text-align: center; 
            font-size: 1.1rem;
        }
        .auth-container input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
            background: rgba(255, 255, 255, 0.07);
        }
        .auth-container button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%); 
            border: none; 
            color: #fff; 
            font-weight: bold; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        /* ==================== الواجهة الرئيسية ==================== */
        .app-container { 
            display: none; 
            width: 95%; 
            max-width: 1300px; 
            height: 90vh; 
            background: rgba(10, 11, 16, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .sidebar { 
            width: 32%; 
            background: rgba(15, 17, 26, 0.7); 
            border-left: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; 
            flex-direction: column; 
        }
        .sidebar-header { 
            background: rgba(20, 23, 36, 0.5); 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .sidebar-header span { font-weight: 700; font-size: 1.1rem; color: #a78bfa; }
        .change-name-btn { 
            background: rgba(239, 68, 68, 0.1); 
            border: 1px solid rgba(239, 68, 68, 0.2); 
            padding: 8px 14px; 
            color: #ef4444; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600;
        }
        .change-name-btn:hover { background: #ef4444; color: #fff; }
        
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { 
            padding: 14px; 
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
        }
        .user-item:hover { 
            background: rgba(124, 58, 237, 0.08); 
            border-color: rgba(124, 58, 237, 0.2);
            transform: translateX(-5px);
        }
        .user-item.active { 
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-color: rgba(124, 58, 237, 0.4);
        }
        .user-avatar { 
            width: 44px; 
            height: 44px; 
            background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%); 
            border-radius: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            color: white; 
            font-size: 1.2rem;
        }

        /* منطقة المحادثة */
        .chat-area { width: 68%; background: rgba(8, 9, 13, 0.4); display: flex; flex-direction: column; position: relative; }
        .chat-header { 
            background: rgba(20, 23, 36, 0.5); 
            padding: 20px; 
            font-weight: 600; 
            font-size: 1.2rem; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .back-btn { display: none; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; padding: 5px; }
        
        /* زر الاتصال الهاتفي */
        .call-icon-btn { margin-right: auto; background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2); color: #06b6d4; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .call-icon-btn:hover { background: #06b6d4; color: white; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }

        .messages-container { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        
        .msg { padding: 12px 18px; border-radius: 16px; max-width: 65%; word-break: break-word; font-size: 1rem; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.15); animation: msgSlide 0.3s ease-out; }
        .msg.incoming { background: rgba(255, 255, 255, 0.04); align-self: flex-start; border-bottom-right-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.05); color: #e2e8f0; }
        .msg.outgoing { background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%); align-self: flex-end; border-bottom-left-radius: 4px; color: #ffffff; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .msg-time { font-size: 0.7rem; opacity: 0.6; text-align: left; margin-top: 6px; }

        .input-area { background: rgba(15, 17, 26, 0.8); padding: 20px; display: flex; align-items: center; gap: 12px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .input-area input { flex: 1; padding: 14px 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); color: white; border-radius: 14px; outline: none; font-size: 1rem; }
        .input-area input:focus { border-color: #06b6d4; background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }

        .mic-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: #06b6d4; padding: 14px; border-radius: 14px; cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; }
        .mic-btn.recording { background: #ef4444 !important; color: white !important; box-shadow: 0 0 15px #ef4444; animation: pulse 1s infinite; }

        .input-area button.send-btn { background: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%); border: none; color: white; padding: 14px 28px; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3); }

        .no-chat-selected { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; color: #64748b; font-size: 1.2rem; text-align: center; padding: 20px; }
        audio { margin-top: 5px; max-width: 100%; display: block; border-radius: 8px; }

        /* ==================== واجهة مكالمات متطورة ومتحركة ==================== */
        .call-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(7, 8, 14, 0.95); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            z-index: 9999; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            color: white;
            animation: fadeIn 0.3s ease-out;
        }
        .call-avatar { width: 100px; height: 100px; font-size: 2.5rem; border-radius: 24px; box-shadow: 0 0 30px rgba(124, 58, 237, 0.4); margin-bottom: 15px; }
        .call-status { font-size: 1.4rem; font-weight: 600; color: #06b6d4; }
        .call-buttons { display: flex; gap: 20px; margin-top: 30px; }
        .c-btn { border: none; padding: 15px 35px; border-radius: 16px; font-weight: bold; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; }
        .c-btn.accept { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4); }
        .c-btn.decline { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); }

        /* ==================== نظام التجاوب للهاتف ==================== */
        @media (max-width: 768px) {
            body { align-items: stretch; }
            .app-container { width: 100%; height: 100vh; border-radius: 0; border: none; }
            .sidebar { width: 100% !important; border-left: none; display: flex; }
            .chat-area { width: 100% !important; display: none; }
            .app-container.chat-active .sidebar { display: none; }
            .app-container.chat-active .chat-area { display: flex; }
            .back-btn { display: block; }
            .msg { max-width: 80%; }
            .auth-container { padding: 25px; border-radius: 16px; }
            .input-area { padding: 12px; gap: 8px; }
            .input-area button.send-btn { padding: 14px 18px; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- شاشة اختيار الاسم -->
    <div class="auth-container" id="loginSection">
        <h2>المجتمع المشفر ⚡</h2>
        <p>اختار سّمية مستعارة باش تدخل للدردشة الفورية</p>
        <input type="text" id="usernameInput" placeholder="اكتب اسمك المستعار هنا..." max="15">
        <button id="enterChatBtn">اتصال بالخادم</button>
    </div>

    <!-- الواجهة الرئيسية -->
    <div class="app-container" id="appSection">
        <!-- السايدبار -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span id="myProfileName">المستخدم: ...</span>
                <button class="change-name-btn" id="changeNameBtn">مغادرة</button>
            </div>
            <div class="user-list" id="usersListContainer"></div>
        </div>

        <!-- منطقة الشات والرسائل -->
        <div class="chat-area" id="chatAreaContainer">
            <div class="no-chat-selected" id="noChatPlaceholder">
                <div style="font-size: 3rem; margin-bottom: 10px;">💬</div>
                <div>عزل شي حد من القائمة باش تبدا معاه محادثة ومكالمات مشفرة بالكامل</div>
            </div>
            
            <div style="display: none; flex-direction: column; height: 100%;" id="activeChatBox">
                <div class="chat-header">
                    <button class="back-btn" id="backToUsersBtn">⬅️</button>
                    <div class="user-avatar" id="activeChatAvatar">?</div>
                    <div id="activeChatName">المستخدم</div>
                    <!-- زر الاتصال الجديد -->
                    <button class="call-icon-btn" id="callBtn" title="بدء مكالمة صوتية">📞 اتصال</button>
                </div>
                <div class="messages-container" id="messagesBox"></div>
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="اكتب رسالتك السرية هنا..." autocomplete="off">
                    <button class="mic-btn" id="micBtn" title="تسجيل رسالة صوتية">🎤</button>
                    <button class="send-btn" id="sendMsgBtn">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <!-- واجهة المكالمات المنبثقة (Call Overlay) -->
    <div class="call-overlay" id="callOverlay">
        <div class="user-avatar call-avatar" id="callOverlayAvatar">?</div>
        <h2 id="callOverlayName">اسم المستخدم</h2>
        <div class="call-status" id="callOverlayStatus">جاري الاتصال المباشر...</div>
        <div class="call-buttons">
            <button class="c-btn accept" id="acceptCallBtn">قبول ✅</button>
            <button class="c-btn decline" id="declineCallBtn">رفض ✖</button>
            <button class="c-btn decline" id="endCallBtn" style="display: none;">إنهاء المكالمة 🛑</button>
        </div>
    </div>

    <!-- عنصر أوديو مخفي لتشغيل صوت المتصل الآخر -->
    <audio id="remoteAudio" autoplay></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onChildAdded, off, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBDno7fxVLV_GycKE_vbkZTGYHFivUuqbw",
        authDomain: "meryem-ddd8c.firebaseapp.com",
        databaseURL: "https://meryem-ddd8c-default-rtdb.firebaseio.com",
        projectId: "meryem-ddd8c",
        storageBucket: "meryem-ddd8c.firebasestorage.app",
        messagingSenderId: "13335592232",
        appId: "1:13335592232:web:bb671bb45da396215e731d",
        measurementId: "G-7WFB8DRDMK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = localStorage.getItem('chat_uid');
    let myUsername = localStorage.getItem('chat_username');
    let activeChatUserId = null;
    let currentChatRef = null;

    // متغيرات الأوديو والمسجل القديم
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let audioStream = null;

    // متغيرات المكالمة الصوتية (WebRTC)
    let peerConnection = null;
    let localStream = null;
    let currentCallId = null;
    const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

    const loginSection = document.getElementById('loginSection');
    const appSection = document.getElementById('appSection');
    const usernameInput = document.getElementById('usernameInput');
    const enterChatBtn = document.getElementById('enterChatBtn');
    const myProfileName = document.getElementById('myProfileName');
    const usersListContainer = document.getElementById('usersListContainer');
    const noChatPlaceholder = document.getElementById('noChatPlaceholder');
    const activeChatBox = document.getElementById('activeChatBox');
    const activeChatName = document.getElementById('activeChatName');
    const activeChatAvatar = document.getElementById('activeChatAvatar');
    const messagesBox = document.getElementById('messagesBox');
    const msgInput = document.getElementById('msgInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const micBtn = document.getElementById('micBtn');
    const changeNameBtn = document.getElementById('changeNameBtn');
    const backToUsersBtn = document.getElementById('backToUsersBtn');
    const callBtn = document.getElementById('callBtn');

    // عناصر واجهة المكالمة
    const callOverlay = document.getElementById('callOverlay');
    const callOverlayAvatar = document.getElementById('callOverlayAvatar');
    const callOverlayName = document.getElementById('callOverlayName');
    const callOverlayStatus = document.getElementById('callOverlayStatus');
    const acceptCallBtn = document.getElementById('acceptCallBtn');
    const declineCallBtn = document.getElementById('declineCallBtn');
    const endCallBtn = document.getElementById('endCallBtn');
    const remoteAudio = document.getElementById('remoteAudio');

    if (myUid && myUsername) {
        startApp();
    } else {
        loginSection.style.display = "block";
        appSection.style.display = "none";
    }

    enterChatBtn.addEventListener('click', () => {
        const name = usernameInput.value.trim();
        if (!name) return alert("عافاك اكتب سّميتك أولاً!");
        myUid = 'user_' + Math.random().toString(36).substring(2, 11);
        myUsername = name;
        localStorage.setItem('chat_uid', myUid);
        localStorage.setItem('chat_username', myUsername);
        startApp();
    });

    function startApp() {
        loginSection.style.display = "none";
        appSection.style.display = "flex";
        myProfileName.innerText = myUsername + " (أنا) 🌐";
        set(ref(db, 'users/' + myUid), { username: myUsername });
        loadUsersList();
        listenForIncomingCalls(); // تفعيل الاستماع للمكالمات الواردة
    }

    function loadUsersList() {
        usersListContainer.innerHTML = "";
        const usersRef = ref(db, 'users');
        onChildAdded(usersRef, (snapshot) => {
            const userId = snapshot.key;
            const userData = snapshot.val();
            if (userId !== myUid) {
                const item = document.createElement('div');
                item.classList.add('user-item');
                item.setAttribute('id', 'item_' + userId);
                item.innerHTML = `
                    <div class="user-avatar">${userData.username[0].toUpperCase()}</div>
                    <div><strong style="color: #f1f5f9;">${userData.username}</strong></div>
                `;
                item.addEventListener('click', () => {
                    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    appSection.classList.add('chat-active');
                    startPrivateChat(userId, userData.username);
                });
                usersListContainer.appendChild(item);
            }
        });
    }

    function startPrivateChat(targetUid, targetName) {
        activeChatUserId = targetUid;
        noChatPlaceholder.style.display = "none";
        activeChatBox.style.display = "flex";
        activeChatName.innerText = targetName;
        activeChatAvatar.innerText = targetName[0].toUpperCase();
        messagesBox.innerHTML = "";

        const chatId = myUid < targetUid ? `${myUid}_${targetUid}` : `${targetUid}_${myUid}`;
        if (currentChatRef) off(currentChatRef);

        currentChatRef = ref(db, 'private_chats/' + chatId);
        onChildAdded(currentChatRef, (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg');
            msgDiv.classList.add(data.senderId === myUid ? 'outgoing' : 'incoming');
            
            const timeStr = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if (data.type === 'audio') {
                msgDiv.style.minWidth = "240px";
                msgDiv.innerHTML = `<audio src="${data.text}" controls></audio><div class="msg-time">${timeStr}</div>`;
            } else {
                msgDiv.innerHTML = `<div>${data.text}</div><div class="msg-time">${timeStr}</div>`;
            }
            messagesBox.appendChild(msgDiv);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        });
    }

    backToUsersBtn.addEventListener('click', () => { appSection.classList.remove('chat-active'); });

    function sendPrivateMessage() {
        const text = msgInput.value.trim();
        if (text === "" || !activeChatUserId) return;
        const chatId = myUid < activeChatUserId ? `${myUid}_${activeChatUserId}` : `${activeChatUserId}_${myUid}`;
        push(ref(db, 'private_chats/' + chatId), { senderId: myUid, text: text, type: 'text', timestamp: Date.now() });
        msgInput.value = "";
    }

    // ==================== محرك المكالمات الصوتية المباشرة (WebRTC) ====================

    // 1. عند الضغط على زر الاتصال (صادر)
    callBtn.addEventListener('click', async () => {
        if (!activeChatUserId) return;
        currentCallId = myUid < activeChatUserId ? `${myUid}_${activeChatUserId}` : `${activeChatUserId}_${myUid}`;
        
        showCallOverlay(activeChatName.innerText, "جاري الرنين والاتصال المشفر...");
        acceptCallBtn.style.display = "none";
        declineCallBtn.style.display = "none";
        endCallBtn.style.display = "block";

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peerConnection = new RTCPeerConnection(iceServers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = (e) => {
                if (e.candidate) push(ref(db, `calls/${currentCallId}/callerCandidates`), e.candidate.toJSON());
            };
            peerConnection.ontrack = (e) => { remoteAudio.srcObject = e.streams[0]; };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await set(ref(db, `calls/${currentCallId}`), {
                offer: { type: offer.type, sdp: offer.sdp },
                status: 'ringing',
                callerId: myUid,
                callerName: myUsername,
                calleeId: activeChatUserId
            });

            // مراقبة ردود الفعل وتغيرات حالة الاتصال
            onValue(ref(db, `calls/${currentCallId}`), async (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                if (data.status === 'accepted' && data.answer && !peerConnection.currentRemoteDescription) {
                    callOverlayStatus.innerText = "المكالمة نشطة الآن 🟢";
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                if (data.status === 'rejected' || data.status === 'ended') {
                    cleanUpCall();
                }
            });

            onChildAdded(ref(db, `calls/${currentCallId}/calleeCandidates`), (snap) => {
                peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
            });

        } catch (err) {
            alert("فعل صلاحية المايكروفون لبدء المكالمة!");
            cleanUpCall();
        }
    });

    // 2. الاستماع المستمر للمكالمات الواردة من أي مستخدم آخر
    function listenForIncomingCalls() {
        onValue(ref(db, 'calls'), (snapshot) => {
            snapshot.forEach((childSnap) => {
                const callId = childSnap.key;
                const callData = childSnap.val();
                if (callData && callData.calleeId === myUid && callData.status === 'ringing') {
                    currentCallId = callId;
                    showCallOverlay(callData.callerName, "مكالمة صوتية واردة...");
                    acceptCallBtn.style.display = "block";
                    declineCallBtn.style.display = "block";
                    endCallBtn.style.display = "none";
                }
                if (callData && (callData.callerId === myUid || callData.calleeId === myUid) && callData.status === 'ended') {
                    cleanUpCall();
                }
            });
        });
    }

    // 3. عند قبول المكالمة الواردة
    acceptCallBtn.addEventListener('click', async () => {
        acceptCallBtn.style.display = "none";
        declineCallBtn.style.display = "none";
        endCallBtn.style.display = "block";
        callOverlayStatus.innerText = "جاري ربط القنوات الآمنة...";

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peerConnection = new RTCPeerConnection(iceServers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = (e) => {
                if (e.candidate) push(ref(db, `calls/${currentCallId}/calleeCandidates`), e.candidate.toJSON());
            };
            peerConnection.ontrack = (e) => { remoteAudio.srcObject = e.streams[0]; };

            onValue(ref(db, `calls/${currentCallId}`), async (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                if (data.offer && !peerConnection.currentRemoteDescription) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    await update(ref(db, `calls/${currentCallId}`), {
                        answer: { type: answer.type, sdp: answer.sdp },
                        status: 'accepted'
                    });
                    callOverlayStatus.innerText = "المكالمة نشطة الآن 🟢";
                }
            });

            onChildAdded(ref(db, `calls/${currentCallId}/callerCandidates`), (snap) => {
                peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
            });

        } catch (err) {
            alert("عافاك فعل المايكروفون للرد!");
            rejectCallAction();
        }
    });

    // 4. أفعال الرفض والإنهاء
    declineCallBtn.addEventListener('click', rejectCallAction);
    endCallBtn.addEventListener('click', endCallAction);

    async function rejectCallAction() {
        if (currentCallId) await update(ref(db, `calls/${currentCallId}`), { status: 'rejected' });
        cleanUpCall();
    }

    async function endCallAction() {
        if (currentCallId) await update(ref(db, `calls/${currentCallId}`), { status: 'ended' });
        cleanUpCall();
    }

    function showCallOverlay(name, statusText) {
        callOverlayName.innerText = name;
        callOverlayAvatar.innerText = name[0].toUpperCase();
        callOverlayStatus.innerText = statusText;
        callOverlay.style.display = "flex";
    }

    function cleanUpCall() {
        callOverlay.style.display = "none";
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        remoteAudio.srcObject = null;
        if (currentCallId) { set(ref(db, `calls/${currentCallId}`), null); currentCallId = null; }
    }

    // ==================== مسجل الصوت القديم (الأوديو نوت) ====================
    micBtn.addEventListener('click', async () => {
        if (!isRecording) {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(audioStream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (event) => { audioChunks.push(event.data); };
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => { if (activeChatUserId) push(ref(db, 'private_chats/' + (myUid < activeChatUserId ? `${myUid}_${activeChatUserId}` : `${activeChatUserId}_${myUid}`)), { senderId: myUid, text: reader.result, type: 'audio', timestamp: Date.now() }); };
                    audioStream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording'); micBtn.innerText = "🛑";
                msgInput.placeholder = "جاري تسجيل النوت... إضغط 🛑 للإرسال"; msgInput.disabled = true;
            } catch (err) { alert("فعل صلاحية المايكروفون أولاً!"); }
        } else {
            mediaRecorder.stop(); isRecording = false;
            micBtn.classList.remove('recording'); micBtn.innerText = "🎤";
            msgInput.placeholder = "اكتب رسالتك السرية هنا..."; msgInput.disabled = false;
        }
    });

    sendMsgBtn.addEventListener('click', sendPrivateMessage);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrivateMessage(); });
    changeNameBtn.addEventListener('click', () => { localStorage.clear(); location.reload(); });
</script>
</body>
</html>
