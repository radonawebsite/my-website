<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, playsinline">
    <title>ChatPro - Secured & Modern</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; outline: none; }
        body { background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .auth-container { padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .auth-input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 12px; text-align: center; }
        .btn { padding: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-weight: 700; border-radius: 12px; cursor: pointer; }
        .app-container { display: none; width: 98%; max-width: 1400px; height: 95vh; border-radius: 20px; overflow: hidden; flex-direction: row; }
        .sidebar { width: 320px; border-left: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.6); }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(2, 6, 23, 0.4); }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; }
        /* Sticker Section Styling */
        .sticker-saved-bar { padding: 10px; display: flex; gap: 10px; overflow-x: auto; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .saved-sticker { width: 40px; height: 40px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- شاشة الدخول المعدلة -->
    <div class="glass-panel auth-container" id="loginSection">
        <h2>ChatPro Login</h2>
        <input type="text" class="auth-input" id="usernameInput" placeholder="User (1-6 English)" maxlength="6">
        <input type="password" class="auth-input" id="passwordInput" placeholder="Pass (8-10 English)" maxlength="10">
        <button class="btn" id="enterBtn">دخول آمن</button>
    </div>

    <!-- التطبيق -->
    <div class="glass-panel app-container" id="appSection">
        <div class="sidebar">
            <!-- Sidebar content remains the same -->
            <div id="userList" style="padding:10px;"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div id="activeChatDiv" style="display: none; flex-direction: column; height: 100%;">
                <div class="chat-header">...</div>
                
                <!-- بار الستيكرات المحفوظة -->
                <div class="sticker-saved-bar" id="savedStickers">
                    <!-- ستيكراتك غادي تبان هنا -->
                </div>

                <div class="messages-container" id="msgsContainer"></div>
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="اكتب رسالة...">
                    <button id="sendBtn">إرسال</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    // Firebase imports (keep as in your code)
    // ... [ملاحظة: خلي كود Firebase ديالك هنا] ...
    
    // --- الوظائف الجديدة ---
    
    // 1. التحقق من البيانات (Validation)
    document.getElementById('enterBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const p = document.getElementById('passwordInput').value;
        
        const userRegex = /^[a-zA-Z]{1,6}$/;
        const passRegex = /^[a-zA-Z]{8,10}$/;

        if (!userRegex.test(u)) return alert("الاسم يجب أن يكون إنجليزياً (1-6 أحرف فقط)!");
        if (!passRegex.test(p)) return alert("كلمة السر يجب أن تكون إنجليزية (8-10 أحرف فقط)!");

        // إذا كلشي صحيح، كمل كود الدخول ديالك
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'flex';
    };

    // 2. نظام حفظ الستيكرات (Persistence)
    const saveSticker = (url) => {
        let saved = JSON.parse(localStorage.getItem('myStickers') || '[]');
        if (!saved.includes(url)) {
            saved.push(url);
            localStorage.setItem('myStickers', JSON.stringify(saved));
            renderSavedStickers();
        }
    };

    const renderSavedStickers = () => {
        const bar = document.getElementById('savedStickers');
        const saved = JSON.parse(localStorage.getItem('myStickers') || '[]');
        bar.innerHTML = '<small style="color:gray; margin-right:5px;">المحفوظة:</small>';
        saved.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'saved-sticker';
            img.onclick = () => sendMessage(url, 'sticker'); // إرسال مباشر
            bar.appendChild(img);
        });
    };

    // عدل دالة الإرسال ديالك باش تزيد الستيكر للحفظ:
    function sendMessage(content, type) {
        if(type === 'sticker') {
            saveSticker(content); // كيحفظو بمجرد ما يرسلو
        }
        // ... باقي كود الإرسال ديالك ...
    }

    // Load stickers on startup
    renderSavedStickers();

</script>
</body>
</html>
