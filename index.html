<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, playsinline">
    <title>ChatPro - Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; outline: none; }

        body {
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* شاشة الدخول */
        .auth-container { padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .auth-container h2 { font-size: 1.8rem; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .avatar-upload { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.1); margin: 0 auto; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; border: 2px dashed rgba(255,255,255,0.3); position: relative; }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .auth-input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 12px; text-align: center; font-size: 1.1rem; transition: border 0.3s; }
        .auth-input:focus { border-color: rgba(255,255,255,0.5); }
        .btn { padding: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; font-weight: 700; border-radius: 12px; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* الواجهة الرئيسية */
        .app-container { display: none; width: 98%; max-width: 1400px; height: 95vh; border-radius: 20px; overflow: hidden; flex-direction: row; }
        
        .sidebar { width: 320px; border-left: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.6); }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .my-profile { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .my-profile img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .user-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .user-item { padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: background 0.2s; }
        .user-item:hover { background: rgba(255, 255, 255, 0.05); }
        .user-item.active { background: rgba(255, 255, 255, 0.1); }
        .user-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: rgba(2, 6, 23, 0.4); }
        .chat-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(15, 23, 42, 0.4); }
        .chat-header-info { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.1rem; }
        .chat-header-info img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .chat-tools { display: flex; gap: 10px; }
        .icon-btn { background: none; border: none; fill: #cbd5e1; width: 35px; height: 35px; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); fill: #fff; }

        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 65%; position: relative; }
        .msg-wrapper.outgoing { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.incoming { align-self: flex-start; align-items: flex-start; }
        .msg-bubble { padding: 12px 18px; border-radius: 18px; font-size: 1rem; line-height: 1.5; position: relative; word-break: break-word; }
        .msg-wrapper.outgoing .msg-bubble { background: rgba(255, 255, 255, 0.15); border-bottom-left-radius: 4px; color: #fff; backdrop-filter: blur(10px); }
        .msg-wrapper.incoming .msg-bubble { background: rgba(0, 0, 0, 0.3); border-bottom-right-radius: 4px; color: #e2e8f0; backdrop-filter: blur(10px); }
        .msg-bubble img.chat-img { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .msg-bubble img.chat-sticker { width: 120px; background: transparent; padding: 0; box-shadow: none; border-radius: 0; }
        .msg-bubble audio { height: 40px; margin-top: 5px; outline: none; }

        .reply-banner { font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; border-right: 3px solid rgba(255,255,255,0.5); margin-bottom: 5px; opacity: 0.8; }
        .msg-actions { display: none; gap: 5px; margin-top: 5px; }
        .msg-wrapper:hover .msg-actions { display: flex; }
        .action-icon { font-size: 0.9rem; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .action-icon:hover { opacity: 1; }
        .reactions-display { display: flex; gap: 3px; margin-top: 3px; font-size: 1rem; }

        .input-area-container { display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .replying-to-bar { display: none; padding: 10px 20px; background: rgba(0,0,0,0.3); font-size: 0.85rem; border-right: 3px solid #fff; align-items: center; justify-content: space-between; }
        .input-area { padding: 15px 20px; display: flex; align-items: center; gap: 10px; }
        .input-area input[type="text"] { flex: 1; padding: 12px 20px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 20px; font-size: 1rem; transition: 0.3s; }
        .input-area input[type="text"]:focus { border-color: rgba(255,255,255,0.4); background: rgba(0, 0, 0, 0.5); }

        /* واجهة المكالمات والفيديو */
        .call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(25px); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .video-container { display: flex; gap: 20px; max-width: 90%; height: 60vh; justify-content: center; position: relative; }
        video { background: #000; border-radius: 16px; object-fit: cover; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #remoteVideo { width: 600px; height: 100%; }
        #localVideo { width: 150px; position: absolute; bottom: 20px; right: 20px; border: 2px solid rgba(255,255,255,0.2); z-index: 10; }
        
        .call-controls { display: flex; gap: 15px; margin-top: 20px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        .c-btn { padding: 12px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; color: white; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .c-btn.accept { background: rgba(34, 197, 94, 0.8); } .c-btn.accept:hover { background: rgb(34, 197, 94); }
        .c-btn.decline { background: rgba(239, 68, 68, 0.8); } .c-btn.decline:hover { background: rgb(239, 68, 68); }
        .c-btn.action { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); } .c-btn.action:hover { background: rgba(255, 255, 255, 0.3); }

        svg { width: 22px; height: 22px; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; width: 100%; height: 100vh; border-radius: 0; border: none; }
            .sidebar { width: 100%; }
            .chat-area { display: none; width: 100%; height: 100%; }
            .app-container.chat-active .sidebar { display: none; }
            .app-container.chat-active .chat-area { display: flex; }
            .video-container { flex-direction: column; height: auto; width: 100%; padding: 10px; }
            #remoteVideo { width: 100%; height: 50vh; }
            #localVideo { position: absolute; bottom: 10px; right: 10px; width: 100px; }
            /* إخفاء زر مشاركة الشاشة في الهاتف */
            #callScreenBtn { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div class="glass-panel auth-container" id="loginSection">
        <h2>ChatPro V3</h2>
        <div class="avatar-upload" id="avatarUploadBtn" title="اختر صورة لحسابك">
            <span id="avatarPlaceholder" style="font-size: 2rem; color: rgba(255,255,255,0.5);">📷</span>
            <img id="avatarPreview" src="">
            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        </div>
        <input type="text" class="auth-input" id="usernameInput" placeholder="الاسم (6 أحرف كحد أقصى)" maxlength="6" autocomplete="off">
        <button class="btn" id="enterBtn">
            <svg viewBox="0 0 24 24"><path d="M15 12l-5 5v-4H2v-2h8V7z" fill="currentColor"/><path d="M22 12c0 5.52-4.48 10-10 10-1.07 0-2.1-.17-3.07-.48l1.45-1.45c.52.12 1.06.19 1.62.19 4.41 0 8-3.59 8-8s-3.59-8-8-8-8 3.59-8 8c0 .56.07 1.1.19 1.62L1.74 7.43C1.26 8.87 1 10.4 1 12c0 5.52 4.48 10 10 10h11v-2h-2.14c1.3-1.6 2.14-3.66 2.14-6z" fill="currentColor" opacity="0.3"/></svg>
            دخول مشفر
        </button>
    </div>

    <!-- التطبيق -->
    <div class="glass-panel app-container" id="appSection">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="my-profile">
                    <img id="myProfileImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                    <span id="myNameDisplay">...</span>
                </div>
                <button class="icon-btn" id="logoutBtn" title="خروج وحذف الحساب">
                    <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                </button>
            </div>
            <div class="user-list" id="userList"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div id="noChatDiv" style="display:flex; justify-content:center; align-items:center; height:100%; opacity:0.5;">
                <h2>اختر مستخدماً للبدء</h2>
            </div>
            
            <div id="activeChatDiv" style="display: none; flex-direction: column; height: 100%;">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <button class="icon-btn" id="backBtn" style="display: none;">
                            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        </button>
                        <img id="activeChatImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                        <span id="activeChatName">المستخدم</span>
                    </div>
                    <div class="chat-tools">
                        <button class="icon-btn" id="callVoiceBtn" title="مكالمة صوتية"><svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg></button>
                        <button class="icon-btn" id="callVideoBtn" title="مكالمة فيديو"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></button>
                        <button class="icon-btn" id="callScreenBtn" title="مشاركة الشاشة (PC فقط)"><svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.11-.9-2-2-2H4c-1.11 0-2 .89-2 2v10c0 1.1.89 2 2 2H0v2h24v-2h-4zM4 16V6h16v10H4z"/></svg></button>
                    </div>
                </div>
                
                <div class="messages-container" id="msgsContainer"></div>
                
                <div class="input-area-container">
                    <div class="replying-to-bar" id="replyBar">
                        <span>رد على: <em id="replyTextPreview"></em></span>
                        <button class="icon-btn" id="cancelReplyBtn" style="width:20px; height:20px; padding:0;"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
                    </div>
                    <div class="input-area">
                        <input type="file" id="mediaInput" accept="image/*" style="display:none;">
                        <button class="icon-btn" id="attachImgBtn" title="إرسال صورة"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
                        <button class="icon-btn" id="attachStickerBtn" title="إرسال ستيكر"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.15-5.13c-.53 1.29-1.8 2.13-3.15 2.13s-2.62-.84-3.15-2.13a.997.997 0 011.86-.74c.26.65.81 1.04 1.29 1.04s1.03-.39 1.29-1.04a.997.997 0 011.86.74zM8.5 11c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm7 0c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5 14.67 11 15.5 11z"/></svg></button>
                        <input type="text" id="msgInput" placeholder="اكتب رسالة..." autocomplete="off">
                        <button class="icon-btn" id="micBtn" title="تسجيل صوتي"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg></button>
                        <button class="icon-btn" id="sendBtn" style="background: rgba(255,255,255,0.1); border-radius: 50%;"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- واجهة المكالمات -->
    <div class="call-overlay" id="callOverlay">
        <h2 id="callTitle" style="color:white; font-weight: 300;">مكالمة واردة...</h2>
        <div class="video-container" id="videoContainer" style="display:none;">
            <!-- تم إضافة playsinline لأجهزة أبل -->
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button class="c-btn accept" id="acceptCallBtn" style="display:none;">قبول</button>
            <button class="c-btn action" id="muteCallBtn" style="display:none;">🎙️ كتم الصوت</button>
            <button class="c-btn action" id="videoToggleBtn" style="display:none;">📹 إيقاف الكاميرا</button>
            <button class="c-btn decline" id="declineCallBtn">إنهاء</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, onChildAdded, onChildRemoved, onChildChanged, onValue, push, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBDno7fxVLV_GycKE_vbkZTGYHFivUuqbw",
        authDomain: "meryem-ddd8c.firebaseapp.com",
        databaseURL: "https://meryem-ddd8c-default-rtdb.firebaseio.com",
        projectId: "meryem-ddd8c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = null; let myUsername = null; let myAvatar = "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
    let activeUserId = null; let replyingTo = null;
    let peerConnection = null; let localStream = null; let currentCallId = null; let callType = 'voice';
    
    // إعدادات اتصال متقدمة لتفادي مشاكل أبل
    const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };
    const USERS_REF = 'v3_users'; const CHATS_REF = 'v3_chats'; const CALLS_REF = 'v3_calls';

    function sanitize(str) { return str.replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function compressImage(file, callback) {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas'); let { width, height } = img;
                if (width > 600) { height *= 600 / width; width = 600; }
                canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
            };
        };
    }

    // 1. الدخول وحذف الحسابات القديمة (Presence)
    document.getElementById('avatarUploadBtn').onclick = () => document.getElementById('avatarInput').click();
    document.getElementById('avatarInput').onchange = (e) => {
        if(e.target.files[0]) compressImage(e.target.files[0], base64 => {
            myAvatar = base64; document.getElementById('avatarPreview').src = base64;
            document.getElementById('avatarPreview').style.display = 'block'; document.getElementById('avatarPlaceholder').style.display = 'none';
        });
    };

    document.getElementById('enterBtn').onclick = async () => {
        let name = document.getElementById('usernameInput').value.trim();
        if(name.length === 0 || name.length > 6) return alert("الاسم يجب أن يكون بين 1 و 6 أحرف!");
        name = sanitize(name);

        const snap = await get(ref(db, USERS_REF)); let exists = false;
        if (snap.exists()) snap.forEach(child => { if(child.val().username === name) exists = true; });
        if(exists) return alert("هذا الاسم مأخوذ حالياً! اختر اسماً آخر.");

        myUid = 'usr_' + Date.now(); myUsername = name;
        const myRef = ref(db, `${USERS_REF}/${myUid}`);
        
        // مسح الحساب أوتوماتيكيا عند الانقطاع أو إغلاق الصفحة (يحل مشكلة الحسابات القديمة)
        await set(myRef, { username: myUsername, avatar: myAvatar, status: 'online' });
        onDisconnect(myRef).remove();

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'flex';
        document.getElementById('myNameDisplay').innerText = myUsername;
        document.getElementById('myProfileImg').src = myAvatar;
        
        loadUsers(); listenIncomingCalls();
        if(window.innerWidth <= 768) document.getElementById('backBtn').style.display = 'block';
    };

    document.getElementById('logoutBtn').onclick = () => { remove(ref(db, `${USERS_REF}/${myUid}`)).then(() => location.reload()); };

    function loadUsers() {
        const list = document.getElementById('userList');
        onChildAdded(ref(db, USERS_REF), snap => {
            if(snap.key === myUid) return;
            const data = snap.val(); const div = document.createElement('div');
            div.className = 'user-item'; div.id = `usr_${snap.key}`;
            div.innerHTML = `<img src="${data.avatar}"><span>${data.username}</span>`;
            div.onclick = () => openChat(snap.key, data.username, data.avatar, div);
            list.appendChild(div);
        });
        
        // إخفاء الحسابات التي انقطع أصحابها فوراً
        onChildRemoved(ref(db, USERS_REF), snap => {
            const el = document.getElementById(`usr_${snap.key}`);
            if(el) el.remove();
            if(activeUserId === snap.key) {
                document.getElementById('activeChatDiv').style.display = 'none';
                document.getElementById('noChatDiv').style.display = 'flex';
            }
        });
    }

    let chatUnsub = null;
    function openChat(targetUid, targetName, targetAvatar, element) {
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active'); activeUserId = targetUid;
        document.getElementById('noChatDiv').style.display = 'none'; document.getElementById('activeChatDiv').style.display = 'flex';
        document.getElementById('activeChatName').innerText = targetName; document.getElementById('activeChatImg').src = targetAvatar;
        document.getElementById('appSection').classList.add('chat-active'); document.getElementById('msgsContainer').innerHTML = '';
        
        const chatId = myUid < targetUid ? `${myUid}_${targetUid}` : `${targetUid}_${myUid}`;
        if(chatUnsub) chatUnsub();
        const chatRef = ref(db, `${CHATS_REF}/${chatId}`);
        onChildAdded(chatRef, snap => renderMsg(snap.key, snap.val()));
        onChildChanged(chatRef, snap => updateMsgDOM(snap.key, snap.val()));
    }

    document.getElementById('backBtn').onclick = () => document.getElementById('appSection').classList.remove('chat-active');

    function renderMsg(msgId, data) {
        const c = document.getElementById('msgsContainer'); const wrap = document.createElement('div');
        wrap.className = `msg-wrapper ${data.sender === myUid ? 'outgoing' : 'incoming'}`; wrap.id = `msg_${msgId}`;
        let content = ''; if(data.replyTo) content += `<div class="reply-banner">رد على: ${data.replyTo.text}</div>`;
        if(data.type === 'text') content += `<span>${data.text}</span>`; if(data.type === 'image') content += `<img src="${data.text}" class="chat-img">`;
        if(data.type === 'sticker') content += `<img src="${data.text}" class="chat-sticker">`; if(data.type === 'audio') content += `<audio src="${data.text}" controls></audio>`;
        let reactHTML = data.reactions ? `<div class="reactions-display">${Object.values(data.reactions).join(' ')}</div>` : '';
        wrap.innerHTML = `<div class="msg-bubble">${content}${reactHTML}</div><div class="msg-actions"><span class="action-icon" onclick="setReply('${msgId}', '${sanitize(data.type==='text'?data.text:'ملف')}')">↩️</span><span class="action-icon" onclick="addReaction('${msgId}', '❤️')">❤️</span><span class="action-icon" onclick="addReaction('${msgId}', '👍')">👍</span></div>`;
        c.appendChild(wrap); c.scrollTop = c.scrollHeight;
    }

    function updateMsgDOM(msgId, data) {
        const wrap = document.getElementById(`msg_${msgId}`); if(!wrap) return;
        const bubble = wrap.querySelector('.msg-bubble'); let oldReacts = bubble.querySelector('.reactions-display');
        if(oldReacts) oldReacts.remove();
        if(data.reactions) bubble.innerHTML += `<div class="reactions-display">${Object.values(data.reactions).join(' ')}</div>`;
    }

    function sendMessage(text, type = 'text') {
        if(!activeUserId) return;
        const chatId = myUid < activeUserId ? `${myUid}_${activeUserId}` : `${activeUserId}_${myUid}`;
        const msg = { sender: myUid, type, text, timestamp: Date.now() };
        if(replyingTo) { msg.replyTo = replyingTo; cancelReply(); }
        push(ref(db, `${CHATS_REF}/${chatId}`), msg); document.getElementById('msgInput').value = '';
    }

    document.getElementById('sendBtn').onclick = () => { const t = document.getElementById('msgInput').value.trim(); if(t) sendMessage(sanitize(t), 'text'); };
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); };
    window.setReply = (id, text) => { replyingTo = { id, text: text.substring(0, 20) + '...' }; document.getElementById('replyBar').style.display = 'flex'; document.getElementById('replyTextPreview').innerText = replyingTo.text; };
    window.cancelReply = () => { replyingTo = null; document.getElementById('replyBar').style.display = 'none'; }; document.getElementById('cancelReplyBtn').onclick = cancelReply;
    window.addReaction = (msgId, emoji) => { const chatId = myUid < activeUserId ? `${myUid}_${activeUserId}` : `${activeUserId}_${myUid}`; update(ref(db, `${CHATS_REF}/${chatId}/${msgId}/reactions`), { [myUid]: emoji }); };

    let isStickerMode = false;
    document.getElementById('attachImgBtn').onclick = () => { isStickerMode = false; document.getElementById('mediaInput').click(); };
    document.getElementById('attachStickerBtn').onclick = () => { isStickerMode = true; document.getElementById('mediaInput').click(); };
    document.getElementById('mediaInput').onchange = (e) => { if(e.target.files[0]) compressImage(e.target.files[0], b64 => sendMessage(b64, isStickerMode ? 'sticker' : 'image')); e.target.value = ''; };

    let mediaRecorder; let audioChunks = []; let isRec = false;
    document.getElementById('micBtn').onclick = async () => {
        if(!isRec) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => { const reader = new FileReader(); reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/mp3' })); reader.onloadend = () => sendMessage(reader.result, 'audio'); stream.getTracks().forEach(t => t.stop()); };
            audioChunks = []; mediaRecorder.start(); isRec = true; document.getElementById('micBtn').style.fill = '#ef4444';
        } else { mediaRecorder.stop(); isRec = false; document.getElementById('micBtn').style.fill = '#cbd5e1'; }
    };

    // 2. إصلاحات المكالمات (WebRTC - دعم أبل والتحكم)
    const overlay = document.getElementById('callOverlay'); const vRemote = document.getElementById('remoteVideo'); const vLocal = document.getElementById('localVideo');
    let isMuted = false; let isVideoOff = false;

    // أزرار التحكم في المكالمة
    document.getElementById('muteCallBtn').onclick = () => {
        if(localStream) {
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('muteCallBtn').innerText = isMuted ? '🔇 تشغيل المايك' : '🎙️ كتم الصوت';
            document.getElementById('muteCallBtn').style.background = isMuted ? 'rgba(239, 68, 68, 0.5)' : 'rgba(255, 255, 255, 0.2)';
        }
    };
    
    document.getElementById('videoToggleBtn').onclick = () => {
        if(localStream && callType === 'video') {
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
            document.getElementById('videoToggleBtn').innerText = isVideoOff ? '📷 تشغيل الكاميرا' : '📹 إيقاف الكاميرا';
            document.getElementById('videoToggleBtn').style.background = isVideoOff ? 'rgba(239, 68, 68, 0.5)' : 'rgba(255, 255, 255, 0.2)';
        }
    };

    async function initCall(type) {
        if(!activeUserId) return; callType = type;
        currentCallId = myUid < activeUserId ? `${myUid}_${activeUserId}` : `${activeUserId}_${myUid}`;
        
        document.getElementById('callTitle').innerText = "جاري الاتصال...";
        document.getElementById('acceptCallBtn').style.display = 'none';
        showCallControls(false, type); overlay.style.display = 'flex';
        
        try {
            if(type === 'screen') {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const mic = await navigator.mediaDevices.getUserMedia({ audio: true });
                mic.getAudioTracks().forEach(t => localStream.addTrack(t));
            } else {
                // إضافة إعدادات أبل القوية
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: type === 'video' ? { facingMode: "user" } : false 
                });
            }

            if(type !== 'voice') { document.getElementById('videoContainer').style.display = 'flex'; vLocal.srcObject = localStream; }
            else { document.getElementById('videoContainer').style.display = 'none'; }

            peerConnection = new RTCPeerConnection(iceServers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.onicecandidate = e => { if(e.candidate) push(ref(db, `${CALLS_REF}/${currentCallId}/callerCands`), e.candidate.toJSON()); };
            peerConnection.ontrack = e => { vRemote.srcObject = e.streams[0]; if(type==='voice'){ vRemote.style.display='none'; }};

            const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
            await set(ref(db, `${CALLS_REF}/${currentCallId}`), { offer: { type: offer.type, sdp: offer.sdp }, status: 'ringing', caller: myUid, callee: activeUserId, type: callType });

            onValue(ref(db, `${CALLS_REF}/${currentCallId}`), async snap => {
                const data = snap.val(); if(!data) return;
                if(data.status === 'accepted' && data.answer && !peerConnection.currentRemoteDescription) {
                    document.getElementById('callTitle').innerText = "المكالمة متصلة";
                    showCallControls(true, type);
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
                if(data.status === 'ended') endCallLocal();
            });
            onChildAdded(ref(db, `${CALLS_REF}/${currentCallId}/calleeCands`), snap => peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())));

        } catch(e) { alert("حدث خطأ في الوصول للأجهزة أو رفضت الصلاحية!"); endCallLocal(); }
    }

    function listenIncomingCalls() {
        onValue(ref(db, CALLS_REF), snap => {
            snap.forEach(child => {
                const data = child.val();
                if(data && data.callee === myUid && data.status === 'ringing') {
                    currentCallId = child.key; callType = data.type;
                    document.getElementById('callTitle').innerText = "مكالمة واردة...";
                    document.getElementById('acceptCallBtn').style.display = 'block';
                    showCallControls(false, callType); overlay.style.display = 'flex';
                }
                if(data && (data.caller === myUid || data.callee === myUid) && data.status === 'ended') endCallLocal();
            });
        });
    }

    document.getElementById('acceptCallBtn').onclick = async () => {
        document.getElementById('acceptCallBtn').style.display = 'none'; document.getElementById('callTitle').innerText = "جاري التوصيل...";
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: callType === 'video' ? { facingMode: "user" } : false });
            if(callType !== 'voice') { document.getElementById('videoContainer').style.display = 'flex'; vLocal.srcObject = localStream; }
            else { document.getElementById('videoContainer').style.display = 'none'; }

            peerConnection = new RTCPeerConnection(iceServers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.onicecandidate = e => { if(e.candidate) push(ref(db, `${CALLS_REF}/${currentCallId}/calleeCands`), e.candidate.toJSON()); };
            peerConnection.ontrack = e => { vRemote.srcObject = e.streams[0]; if(callType==='voice'){ vRemote.style.display='none'; }};

            onValue(ref(db, `${CALLS_REF}/${currentCallId}`), async snap => {
                const data = snap.val(); if(!data) return;
                if(data.offer && !peerConnection.currentRemoteDescription) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
                    update(ref(db, `${CALLS_REF}/${currentCallId}`), { answer: { type: answer.type, sdp: answer.sdp }, status: 'accepted' });
                    document.getElementById('callTitle').innerText = "المكالمة متصلة";
                    showCallControls(true, callType);
                }
            });
            onChildAdded(ref(db, `${CALLS_REF}/${currentCallId}/callerCands`), snap => peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())));
        } catch(e) { endCallLocal(); }
    };

    document.getElementById('declineCallBtn').onclick = () => { if(currentCallId) update(ref(db, `${CALLS_REF}/${currentCallId}`), { status: 'ended' }); endCallLocal(); };

    function showCallControls(isConnected, type) {
        document.getElementById('muteCallBtn').style.display = isConnected ? 'flex' : 'none';
        document.getElementById('videoToggleBtn').style.display = (isConnected && type === 'video') ? 'flex' : 'none';
        
        // إعادة تعيين حالة الأزرار
        isMuted = false; isVideoOff = false;
        document.getElementById('muteCallBtn').innerText = '🎙️ كتم الصوت'; document.getElementById('muteCallBtn').style.background = 'rgba(255, 255, 255, 0.2)';
        document.getElementById('videoToggleBtn').innerText = '📹 إيقاف الكاميرا'; document.getElementById('videoToggleBtn').style.background = 'rgba(255, 255, 255, 0.2)';
    }

    function endCallLocal() {
        overlay.style.display = 'none'; document.getElementById('videoContainer').style.display = 'none';
        showCallControls(false, 'voice');
        if(localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if(peerConnection) { peerConnection.close(); peerConnection = null; }
        vRemote.srcObject = null; vLocal.srcObject = null;
        if(currentCallId) { set(ref(db, `${CALLS_REF}/${currentCallId}`), null); currentCallId = null; }
    }

    document.getElementById('callVoiceBtn').onclick = () => initCall('voice');
    document.getElementById('callVideoBtn').onclick = () => initCall('video');
    document.getElementById('callScreenBtn').onclick = () => {
        // حماية إضافية ضد الهواتف
        if(window.innerWidth <= 768 || /Mobi|Android/i.test(navigator.userAgent)) return alert("مشاركة الشاشة متوفرة فقط في الحواسيب!");
        initCall('screen');
    };

</script>
</body>
</html>
